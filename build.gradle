buildscript {
    repositories {
        maven { url = 'https://maven.minecraftforge.net' }
        mavenCentral()
    }
    dependencies {
        classpath 'net.minecraftforge.gradle:ForgeGradle:3.+'
    }
}

apply plugin: 'net.minecraftforge.gradle'
apply plugin: 'eclipse'
apply plugin: 'maven-publish'

version = '1.0.1'
group = 'jp.apple.arad'
archivesBaseName = 'ARAD-forge1.12.2'

sourceCompatibility = 1.8
targetCompatibility = 1.8

minecraft {
    mappings channel: 'snapshot', version: '20171003-1.12'
    accessTransformer = file('src/main/resources/META-INF/fix-rtm_at.cfg')

    runs {
        client {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'SCAN,REGISTRIES,REGISTRYDUMP'
            property 'forge.logging.console.level', 'debug'
        }
    }
}

dependencies {
    minecraft 'net.minecraftforge:forge:1.12.2-14.23.5.2860'

    compileOnly fileTree(dir: 'libs', include: ['*.jar'])
    compileOnly files('libs/core.jar')

    implementation 'io.sigpipe:jbsdiff:1.0'
    implementation 'org.sejda.imageio:webp-imageio:0.1.6'
}

jar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    from(sourceSets.main.resources.srcDirs) {
        include '**/*.class'
        include '**/*.kotlin_module'
        include 'assets/**'
        include 'META-INF/services/**'
        exclude 'META-INF/MANIFEST.MF'
        exclude 'mcmod.info'
    }

    manifest {
        attributes([
                "Specification-Title": "apple-rtm",
                "Specification-Vendor": "apple-rtm",
                "Specification-Version": "1",
                "Implementation-Title": project.name,
                "Implementation-Version": "${version}",
                "Implementation-Vendor" :"apple-rtm",
                "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ"),
        ])
    }
}

jar.finalizedBy('reobfJar')

//テスト用に飛ばすためのやつ
task copyJarToTest(type: Copy) {
    dependsOn 'reobfJar'
    from "build/libs"
    into "/Users/S/Library/Application Support/PrismLauncher/instances/テスト/minecraft/mods"
    include "${archivesBaseName}-${version}.jar"
}
task copyJarToServer(type: Copy) {
    dependsOn 'reobfJar'
    from "build/libs"
    into "/Users/S/Desktop/ApplepieServer/mods"
    include "${archivesBaseName}-${version}.jar"
}

build.dependsOn copyJarToTest
build.dependsOn copyJarToServer
